
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cipher Visualization</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet" />

    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js" defer></script>

    <link rel="stylesheet" href="css/style.css" />
</head>
 
<body>
    <div id="app">

        <header id="site-header">
            <h1 class="site-title">Cipher Attacks</h1>
            <span class="site-meta">CS 101 — Spring 2026</span>
        </header>
        
        <nav id="tab-nav" role="tablist">
            <button role="tab" data-tab="crypto-solver" class="tab-btn active">Crypto-solver</button>
        </nav>
        

        <main id="content">
        
            <!-- CRYPTO-SOLVER -->
            <section id="crypto-solver" class="tab-panel active" role="tabpanel">

                <!-- Settings Bar -->
                <div class="settings-bar">
                    <label class="setting-group">
                        <span class="setting-label">Cipher Type</span>
                        <select class="cipher-select">
                            <option value="caesar">Caesar</option>
                            <option value="substitution">Substitution</option>
                            <option value="vigenere">Vigenère</option>
                        </select>
                    </label>

                    <label class="setting-group">
                        <span class="setting-label">Key</span>
                        <input type="text" class="key-input" placeholder="Enter key..." />
                    </label>

                    <button class="randomize-btn">Randomize</button>
                </div>

                <textarea class="input-text" rows="4" cols="60">HELLO WORLD</textarea>

                <br><br>

                <label>Shift: <span class="shift-val">3</span></label>
                <input type="range" class="shift-slider" min="0" max="25" value="3" />

                <div class="text-grid"></div>

                <h3>Output:</h3>
                <div class="output"></div>

            </section>

        </main>

    </div>

    <script type="module" src="js/main.js"></script>
 
</body>
</html>
