
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cipher Visualization</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet" />

    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js" defer></script>

    <link rel="stylesheet" href="css/style.css" />
</head>
 
<body>
    <div id="app">

        <header id="site-header">
            <h1 class="site-title">Cipher Attacks</h1>
            <span class="site-meta">CS 101 — Spring 2026</span>
        </header>
        
        <nav id="tab-nav" role="tablist">
            <button role="tab" data-tab="crypto-solver" class="tab-btn active">Crypto-solver</button>
        </nav>
        

        <main id="content">
        
            <!-- CRYPTO-SOLVER -->
            <section id="crypto-solver" class="tab-panel active" role="tabpanel">

                <!-- Settings Bar -->
                <div class="settings-bar">
                    <div class="settings-controls">
                        <div class="setting-group">
                            <div class="setting-label setting-label-with-info">
                                <label for="cipher-select">Cipher Type</label>
                                <button
                                    type="button"
                                    class="cipher-info-btn"
                                    title="Caesar shifts every printable ASCII character, including spaces and punctuation."
                                    aria-label="Caesar info"
                                    hidden
                                >i</button>
                            </div>
                            <select id="cipher-select" class="cipher-select">
                                <option value="caesar">Caesar</option>
                                <option value="substitution">Substitution</option>
                                <option value="vigenere">Vigenère</option>
                            </select>
                        </div>

                        <label class="setting-group">
                            <span class="setting-label">Key</span>
                            <div class="key-wrap">
                                <input type="text" class="key-input" placeholder="Enter key..." />
                                <button class="randomize-btn" title="Random key">&#9858;</button>
                            </div>
                        </label>
                    </div>

                    <label class="setting-group setting-group-text">
                        <span class="setting-label">Plaintext</span>
                        <div class="textarea-wrap">
                            <textarea class="input-text" rows="2" maxlength="256">HELLO WORLD</textarea>
                            <button class="random-text-btn" title="Random plaintext">&#9858;</button>
                        </div>
                    </label>
                </div>

                <div class="workspace">

                    <!-- Left: Matrix View -->
                    <div class="panel panel-matrix">
                        <h4 class="panel-heading">Encrypted Text</h4>
                        <div class="text-grid"></div>
                        <div class="matrix-actions">
                            <button class="encrypt-btn">Encrypt</button>
                            <button class="solve-btn">Solve</button>
                            <label class="rounds-wrap" title="Simulated-annealing rounds">
                                <span class="rounds-label">Rounds</span>
                                <input type="number" class="rounds-input" min="1" max="50" value="15" />
                            </label>
                        </div>
                    </div>

                    <!-- Right: Analysis Panel -->
                    <div class="panel panel-analysis">
                        <h4 class="panel-heading">Frequency Analysis</h4>
                        <div class="frequency-chart"></div>
                    </div>

                </div>

                <!-- Attack Panel -->
                <div class="attack-panel" hidden>
                    <div class="attack-body">
                        <div class="mapping-table-wrap">
                            <h4 class="panel-heading">Mapping</h4>
                            <div class="mapping-table">
                                <div class="mapping-row mapping-row-cipher"></div>
                                <div class="mapping-row mapping-row-plain"></div>
                            </div>
                        </div>
                        <div class="score-track-wrap">
                            <h4 class="panel-heading">Fitness</h4>
                            <div class="score-track">
                                <canvas class="score-canvas"></canvas>
                                <span class="score-value">0</span>
                            </div>
                        </div>
                    </div>
                    <div class="attack-controls">
                        <button class="attack-play-btn" title="Play">&#9654;</button>
                        <button class="attack-step-btn" title="Step" disabled>&#9197;</button>
                        <label class="attack-speed-wrap" title="Steps per frame">
                            <span class="attack-speed-label">Speed</span>
                            <input type="range" class="attack-speed" min="0" max="3" step="1" value="2" />
                            <span class="attack-speed-value">100×</span>
                        </label>
                        <span class="attack-iter" title="Iterations">iter 0</span>
                        <span class="attack-state">IDLE</span>
                    </div>
                </div>

            </section>

        </main>

    </div>

    <script type="module" src="js/main.js"></script>
 
</body>
</html>
